<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicket - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            background: #f3f4f6;
        }

        .app-container {
            width: 100%;
            max-width: 428px;
            margin: 0 auto;
            min-height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px 24px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }

        .logo {
            font-size: 2rem;
            font-family: cursive;
            font-weight: bold;
            background: linear-gradient(to right, #a855f7, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .feed {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        .post {
            border-bottom: 1px solid #e5e7eb;
            padding: 16px 24px;
            background: white;
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 12px;
            object-fit: cover;
        }

        .post-user-info {
            flex: 1;
        }

        .post-user-name {
            font-weight: 600;
            font-size: 0.9375rem;
        }

        .post-username {
            color: #6b7280;
            font-size: 0.875rem;
        }

        .post-time {
            color: #9ca3af;
            font-size: 0.875rem;
        }

        .post-content {
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .post-image {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .post-actions {
            display: flex;
            gap: 24px;
            color: #6b7280;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 428px;
            background: black;
            padding: 16px 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 8px;
            position: relative;
        }

        .nav-btn svg {
            width: 28px;
            height: 28px;
            stroke: white;
            fill: none;
            stroke-width: 2;
        }

        .nav-btn.active::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(to right, #a855f7, #fb923c);
            border-radius: 0 0 4px 4px;
        }
    </style>
</head>
<body>
