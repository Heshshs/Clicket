<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicket - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            width: 100%;
            max-width: 428px;
            margin: 0 auto;
            min-height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.1);
        }

        .header {
            padding: 60px 24px 40px 24px;
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            font-family: cursive;
            font-weight: bold;
            background: linear-gradient(to right, #a855f7, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .tagline {
            color: #6b7280;
            font-size: 0.875rem;
        }

        .content {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .welcome-text {
            margin-bottom: 32px;
        }

        .welcome-text h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .welcome-text p {
            color: #6b7280;
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #a855f7;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 24px;
        }

        .forgot-password a {
            color: #a855f7;
            text-decoration: none;
            font-size: 0.875rem;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: linear-gradient(to right, #a855f7, #fb923c);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            color: #6b7280;
            font-size: 0.875rem;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #d1d5db;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .signup-link {
            text-align: center;
            color: #6b7280;
            font-size: 0.875rem;
        }

        .signup-link a {
            color: #a855f7;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">Clicket</div>
            <p class="tagline">Connect with friends</p>
        </div>

        <div class="content">
            <div class="welcome-text">
                <h2>Welcome back</h2>
                <p>Sign in to continue</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email or Username</label>
                    <input type="text" id="username" placeholder="Enter your email or username" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="forgot-password">
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary">Sign In</button>

                <div class="divider">or</div>

                <div class="signup-link">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('username', document.getElementById('username').value);
            window.location.href = 'home.html';
        });
    </script>
</body>
</html>
