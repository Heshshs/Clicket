<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicket - Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            background: white;
        }

        .app-container {
            width: 100%;
            max-width: 428px;
            margin: 0 auto;
            min-height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px 24px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }

        .logo {
            font-size: 2rem;
            font-family: cursive;
            font-weight: bold;
            background: linear-gradient(to right, #a855f7, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 24px 100px 24px;
            overflow-y: auto;
        }

        .profile-pic-container {
            position: relative;
            margin-bottom: 16px;
        }

        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
        }

        .verified-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 24px;
            height: 24px;
            background: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.75rem;
        }

        .display-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .username {
            color: #6b7280;
            font-size: 0.875rem;
            margin-bottom: 16px;
        }

        .stats {
            display: flex;
            gap: 32px;
            margin-bottom: 24px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-weight: 600;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #6b7280;
        }

        .edit-profile-btn {
            width: 90%;
            padding: 8px 24px;
            border-radius: 9999px;
            border: 1px solid #d1d5db;
            background: white;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .posts-section {
            width: 100%;
            padding-bottom: 16px;
        }

        .posts-title {
            font-weight: 600;
            margin-bottom: 12px;
            text-align: left;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .post-thumbnail {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 428px;
            background: black;
            padding: 16px 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 8px;
            position: relative;
        }

        .nav-btn svg {
            width: 28px;
            height: 28px;
            stroke: white;
            fill: none;
            stroke-width: 2;
        }

        .nav-btn.active::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(to right, #a855f7, #fb923c);
            border-radius: 0 0 4px 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">Clicket</div>
        </div>

        <!-- Profile Section -->
        <div class="profile-section">
            <div class="profile-pic-container">
                <img src="https://heshshs.github.io/Clicket/deshprofile.jpg" alt="Profile" class="profile-pic">
                <div class="verified-badge">✓</div>
            </div>

            <h2 class="display-name">desh</h2>
            <p class="username">@heshesh12</p>

            <!-- Stats -->
            <div class="stats">
                <div class="stat">
                    <div class="stat-value">10</div>
                    <div class="stat-label">Following</div>
                </div>
                <div class="stat">
                    <div class="stat-value">6767</div>
                    <div class="stat-label">Followers</div>
                </div>
                <div class="stat">
                    <div class="stat-value">3</div>
                    <div class="stat-label">Posts</div>
                </div>
            </div>

            <!-- Edit Profile Button -->
            <button class="edit-profile-btn" onclick="window.location.href='edit-profile.html'">Edit Profile</button>

            <!-- Posts -->
            <div class="posts-section">
                <h3 class="posts-title">My Posts</h3>
                <div class="posts-grid">
                    <img src="https://heshshs.github.io/Clicket/1444e83054f150c7f0a04441574d2a75.jpg" alt="Post 1" class="post-thumbnail">
                    <img src="https://heshshs.github.io/Clicket/67833d1bc407cb2a8c1d9ea29d6fa9cb.jpg" alt="Post 2" class="post-thumbnail">
                    <img src="https://heshshs.github.io/Clicket/9951e7300e4e445cddfa363f807362ef (1).jpg" alt="Post 3" class="post-thumbnail">
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-btn" onclick="window.location.href='home.html'">
                <svg viewBox="0 0 24 24">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>
            <button class="nav-btn" onclick="window.location.href='search.html'">
                <svg viewBox="0 0 24 24">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <line x1="19" y1="8" x2="19" y2="14"></line>
                    <line x1="22" y1="11" x2="16" y2="11"></line>
                </svg>
            </button>
            <button class="nav-btn" onclick="window.location.href='messages.html'">
                <svg viewBox="0 0 24 24">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </button>
            <button class="nav-btn active" onclick="window.location.href='profile.html'">
                <svg viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // Check if user is logged in
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
