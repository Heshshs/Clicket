<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicket - Profile</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: white;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid #e5e7eb;
}

.logo {
    font-size: 2rem;
    font-family: cursive;
    font-weight: bold;
    background: linear-gradient(to right, #a855f7, #fb923c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* SETTINGS ICON */
.settings-btn {
    background: none;
    border: none;
    cursor: pointer;
}

.settings-btn svg {
    width: 24px;
    height: 24px;
    stroke: black;
    fill: none;
    stroke-width: 2;
}

/* PROFILE */
.profile-section {
    text-align: center;
    padding: 32px 24px 100px;
}

.profile-pic {
    width: 96px;
    height: 96px;
    border-radius: 50%;
}

.display-name {
    font-weight: 600;
    margin-top: 10px;
}

.username {
    color: gray;
    font-size: 14px;
}

.stats {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin: 20px 0;
}

.stat-value {
    font-weight: bold;
}

.edit-profile-btn {
    padding: 8px 20px;
    border-radius: 20px;
    border: 1px solid #ccc;
    background: white;
    cursor: pointer;
}

/* POSTS */
.posts-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-top: 20px;
}

.post-thumbnail {
    width: 100%;
    border-radius: 8px;
}

/* NAV */
.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    max-width: 428px;
    background: black;
    display: flex;
    justify-content: space-around;
    padding: 15px;
}

.nav-btn svg {
    width: 26px;
    stroke: white;
    fill: none;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">Clicket</div>

    <!-- SETTINGS ICON -->
    <button class="settings-btn" onclick="window.location.href='settings.html'">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 
            2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 
            0 0 0-1.82-.33 1.65 1.65 
            0 0 0-1 1.51V21a2 2 0 
            1 1-4 0v-.09a1.65 1.65 
            0 0 0-1-1.51 1.65 1.65 
            0 0 0-1.82.33l-.06.06a2 
            2 0 1 1-2.83-2.83l.06-.06a1.65 
            1.65 0 0 0 .33-1.82"></path>
        </svg>
    </button>
</div>

<div class="profile-section">
    <img src="https://heshshs.github.io/Clicket/deshprofile.jpg" class="profile-pic">

    <h2 class="display-name">desh</h2>
    <p class="username">@heshesh12</p>

    <div class="stats">
        <div><div class="stat-value">10</div>Following</div>
        <div><div class="stat-value">6767</div>Followers</div>
        <div><div class="stat-value">3</div>Posts</div>
    </div>

    <button class="edit-profile-btn" onclick="location.href='edit-profile.html'">
        Edit Profile
    </button>

    <div class="posts-grid">
        <img src="https://heshshs.github.io/Clicket/1444e83054f150c7f0a04441574d2a75.jpg" class="post-thumbnail">
        <img src="https://heshshs.github.io/Clicket/67833d1bc407cb2a8c1d9ea29d6fa9cb.jpg" class="post-thumbnail">
        <img src="https://heshshs.github.io/Clicket/9951e7300e4e445cddfa363f807362ef (1).jpg" class="post-thumbnail">
    </div>
</div>

</body>
</html>
