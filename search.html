<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicket - Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            background: white;
        }

        .app-container {
            width: 100%;
            max-width: 428px;
            margin: 0 auto;
            min-height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px 24px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }

        .logo {
            font-size: 2rem;
            font-family: cursive;
            font-weight: bold;
            background: linear-gradient(to right, #a855f7, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-bar {
            padding: 16px 24px;
            background: white;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 9999px;
            background: #f9fafb;
            font-size: 0.875rem;
        }

        .search-input:focus {
            outline: none;
            border-color: #a855f7;
        }

        .section-title {
            padding: 16px 24px 8px 24px;
            font-weight: 600;
            font-size: 1rem;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        .user-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f3f4f6;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.9375rem;
            margin-bottom: 2px;
        }

        .username {
            color: #6b7280;
            font-size: 0.875rem;
        }

        .follow-btn {
            padding: 6px 20px;
            border-radius: 9999px;
            background: linear-gradient(to right, #a855f7, #fb923c);
            color: white;
            border: none;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
        }

        .follow-btn.following {
            background: white;
            color: #6b7280;
            border: 1px solid #d1d5db;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 428px;
            background: black;
            padding: 16px 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 8px;
            position: relative;
        }

        .nav-btn svg {
            width: 28px;
            height: 28px;
            stroke: white;
            fill: none;
            stroke-width: 2;
        }

        .nav-btn.active::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(to right, #a855f7, #fb923c);
            border-radius: 0 0 4px 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">Clicket</div>
        </div>

        <!-- Search Bar -->
        <div class="search-bar">
            <input type="text" class="search-input" placeholder="Search people...">
        </div>

        <div class="section-title">Suggested for you</div>

        <!-- Users List -->
        <div class="users-list">
            <div class="user-item">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200" alt="User" class="avatar">
                <div class="user-info">
                    <div class="user-name">Sarah Johnson</div>
                    <div class="username">@sarahj</div>
                </div>
                <button class="follow-btn" onclick="toggleFollow(this)">Follow</button>
            </div>

            <div class="user-item">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200" alt="User" class="avatar">
                <div class="user-info">
                    <div class="user-name">Mike Chen</div>
                    <div class="username">@mikechen</div>
                </div>
                <button class="follow-btn" onclick="toggleFollow(this)">Follow</button>
            </div>

            <div class="user-item">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200" alt="User" class="avatar">
                <div class="user-info">
                    <div class="user-name">Emma Wilson</div>
                    <div class="username">@emmaw</div>
                </div>
                <button class="follow-btn" onclick="toggleFollow(this)">Follow</button>
            </div>

            <div class="user-item">
                <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=200" alt="User" class="avatar">
                <div class="user-info">
                    <div class="user-name">Alex Taylor</div>
                    <div class="username">@alext</div>
                </div>
                <button class="follow-btn" onclick="toggleFollow(this)">Follow</button>
            </div>

            <div class="user-item">
                <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=200" alt="User" class="avatar">
                <div class="user-info">
                    <div class="user-name">Jessica Lee</div>
                    <div class="username">@jessical</div>
                </div>
                <button class="follow-btn" onclick="toggleFollow(this)">Follow</button>
            </div>

            <div class="user-item">
                <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200" alt="User" class="avatar">
                <div class="user-info">
                    <div class="user-name">David Park</div>
                    <div class="username">@davidp</div>
                </div>
                <button class="follow-btn" onclick="toggleFollow(this)">Follow</button>
            </div>

            <div class="user-item">
                <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=200" alt="User" class="avatar">
                <div class="user-info">
                    <div class="user-name">Rachel Green</div>
                    <div class="username">@rachelg</div>
                </div>
                <button class="follow-btn" onclick="toggleFollow(this)">Follow</button>
            </div>

            <div class="user-item">
                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=200" alt="User" class="avatar">
                <div class="user-info">
                    <div class="user-name">Tom Anderson</div>
                    <div class="username">@toma</div>
                </div>
                <button class="follow-btn" onclick="toggleFollow(this)">Follow</button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-btn" onclick="window.location.href='home.html'">
                <svg viewBox="0 0 24 24">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>
            <button class="nav-btn active" onclick="window.location.href='search.html'">
                <svg viewBox="0 0 24 24">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <line x1="19" y1="8" x2="19" y2="14"></line>
                    <line x1="22" y1="11" x2="16" y2="11"></line>
                </svg>
            </button>
            <button class="nav-btn" onclick="window.location.href='messages.html'">
                <svg viewBox="0 0 24 24">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </button>
            <button class="nav-btn" onclick="window.location.href='profile.html'">
                <svg viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // Check if user is logged in
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'index.html';
        }

        function toggleFollow(button) {
            if (button.classList.contains('following')) {
                button.classList.remove('following');
                button.textContent = 'Follow';
            } else {
                button.classList.add('following');
                button.textContent = 'Following';
            }
        }
    </script>
</body>
</html>
