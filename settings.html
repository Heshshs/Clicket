<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #e5e7eb;
    display: flex;
    justify-content: center; /* horizontal center */
    min-height: 100vh;
    flex-direction: column;
}

/* CONTAINER */
.app-container {
    width: 100%;
    max-width: 428px;
    min-height: 100vh;
    background: white;
    padding: 20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto; /* scroll if content taller than screen */
}

/* TITLES */
h2 {
    text-align: center;
    margin: 20px 0;
}

h4 {
    margin-bottom: 10px;
}

/* SECTION */
.section {
    margin-top: 20px;
}

/* SETTINGS ROW */
.setting {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 15px 0;
}

/* SWITCH */
.switch {
    position: relative;
    width: 42px;
    height: 22px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    background: #ccc;
    border-radius: 20px;
    width: 100%;
    height: 100%;
    cursor: pointer;
}

.slider::before {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: 0.3s;
}

input:checked + .slider {
    background: linear-gradient(to right, #a855f7, #fb923c);
}

input:checked + .slider::before {
    transform: translateX(20px);
}

/* SAVE BUTTON */
.save {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(to right, #a855f7, #fb923c);
    color: white;
    margin-top: 25px;
    font-weight: bold;
    cursor: pointer;
}

/* DARK MODE */
.dark-mode body {
    background: #1f2937;
    color: #f9fafb;
}

.dark-mode .app-container {
    background: #0a0a0a;
    color: #f9fafb;
}

.dark-mode h2, 
.dark-mode h4, 
.dark-mode span {
    color: #f9fafb;
}

.dark-mode .save {
    background: linear-gradient(to right, #7c3aed, #f97316);
}

/* SCROLLBAR FOR DARK MODE */
.dark-mode .app-container::-webkit-scrollbar {
    width: 6px;
}

.dark-mode .app-container::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 3px;
}
</style>
</head>

<body>

<div class="app-container">

    <h2>Settings</h2>

    <div class="section">
        <h4>Notification Settings</h4>

        <div class="setting">
            <span>Push Notifications</span>
            <label class="switch">
                <input type="checkbox" id="pushNotif">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting">
            <span>Email Notifications</span>
            <label class="switch">
                <input type="checkbox" id="emailNotif">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting">
            <span>SMS Notifications</span>
            <label class="switch">
                <input type="checkbox" id="smsNotif">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="section">
        <h4>Other Settings</h4>

        <div class="setting">
            <span>Dark Mode</span>
            <label class="switch">
                <input type="checkbox" id="darkMode">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting">
            <span>Search History</span>
            <span>></span>
        </div>

        <div class="setting">
            <span style="color:red;">Delete Account</span>
        </div>
    </div>

    <button class="save" onclick="saveSettings()">Save Changes</button>

</div>

<script>
// APPLY DARK MODE
function applyDarkMode(isDark) {
    if (isDark) {
        document.body.classList.add("dark-mode");
    } else {
        document.body.classList.remove("dark-mode");
    }
}

// LOAD SAVED SETTINGS ON PAGE LOAD
window.onload = function () {
    const darkModeEnabled = localStorage.getItem("darkMode") === "true";
    const pushEnabled = localStorage.getItem("pushNotif") === "true";
    const emailEnabled = localStorage.getItem("emailNotif") === "true";
    const smsEnabled = localStorage.getItem("smsNotif") === "true";

    document.getElementById("darkMode").checked = darkModeEnabled;
    document.getElementById("pushNotif").checked = pushEnabled;
    document.getElementById("emailNotif").checked = emailEnabled;
    document.getElementById("smsNotif").checked = smsEnabled;

    applyDarkMode(darkModeEnabled);
};

// TOGGLE DARK MODE ON SWITCH
document.getElementById("darkMode").addEventListener("change", function () {
    applyDarkMode(this.checked);
});

// SAVE SETTINGS
function saveSettings() {
    localStorage.setItem("darkMode", document.getElementById("darkMode").checked);
    localStorage.setItem("pushNotif", document.getElementById("pushNotif").checked);
    localStorage.setItem("emailNotif", document.getElementById("emailNotif").checked);
    localStorage.setItem("smsNotif", document.getElementById("smsNotif").checked);

    // Redirect to profile or another page
    window.location.href = "profile.html";
}
</script>

</body>
</html>
